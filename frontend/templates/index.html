<!DOCTYPE html>
<html>
<head>
    <title>AI Complaint System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        button {
            padding: 8px 15px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
        input {
            padding: 5px;
        }
    </style>
</head>
<body>

    <h1>🤖 AI Complaint Classification System</h1>

    <div class="box">
        <h2>Text Complaint (Banking)</h2>
        <form action="/predict_text" method="post">
            <input type="text" name="text" placeholder="Enter complaint" required>
            <button type="submit">Predict</button>
        </form>
    </div>

    <div class="box">
        <h2>Image Complaint (Civic)</h2>
        <form action="/predict_image" method="post" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <button type="submit">Upload & Predict</button>
        </form>
    </div>

    {% if result %}
        <div class="box">
            <h2>{{ result|safe }}</h2>
        </div>
    {% endif %}

</body>
</html>
